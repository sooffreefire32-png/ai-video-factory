name: 🎬 AI YouTube Video Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic'
        required: true
        default: 'Amazing Facts About Space'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Create output dirs
        run: mkdir -p output/media output/audio output/segments output/final data

      - name: Get last video ID
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'data/last_video_id.txt'
              });
              const content = Buffer.from(data.content, 'base64').toString('utf8').trim();
              fs.writeFileSync('data/last_video_id.txt', content);
            } catch(e) {
              fs.writeFileSync('data/last_video_id.txt', '');
            }

      - name: 01 Analyze Retention
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/01_analyze_retention.py

      - name: 02 Generate Script + SEO
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TOPIC: ${{ inputs.topic }}
        run: python scripts/02_generate_script.py

      - name: 03 Download Media
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python scripts/03_download_media.py

      - name: 04 Generate Voice
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/04_generate_voice.py

      - name: 05 Generate Thumbnail
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/05_generate_thumbnail.py

      - name: 06 Merge Video
        run: python scripts/06_merge_video.py

      - name: 07 Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/07_upload_youtube.py

      - name: Save video ID
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('output/video_id.txt')) return;
            const videoId = fs.readFileSync('output/video_id.txt', 'utf8').trim();
            if (!videoId) return;
            const content = Buffer.from(videoId).toString('base64');
            try {
              const { data: existing } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'data/last_video_id.txt'
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'data/last_video_id.txt',
                message: `Save video ID: ${videoId}`,
                content: content,
                sha: existing.sha
              });
            } catch(e) {
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'data/last_video_id.txt',
                message: `Save video ID: ${videoId}`,
                content: content
              });
            }