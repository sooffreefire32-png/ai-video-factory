name: YouTube OAuth Token Generator

on:
  workflow_dispatch:

jobs:
  oauth:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install google-auth-library readline-sync

      - name: Generate OAuth URL
        run: |
          node -e "
          const { google } = require('googleapis');

          const oauth2Client = new google.auth.OAuth2(
            process.env.CLIENT_ID,
            process.env.CLIENT_SECRET,
            'urn:ietf:wg:oauth:2.0:oob'
          );

          const url = oauth2Client.generateAuthUrl({
            access_type: 'offline',
            scope: ['https://www.googleapis.com/auth/youtube.upload']
          });

          console.log('\n👉 OPEN THIS LINK:\n', url);
          "
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Exchange Code for Token
        run: |
          node -e "
          const { google } = require('googleapis');
          const readline = require('readline-sync');

          const code = readline.question('\n👉 Paste Google Auth Code here: ');

          const oauth2Client = new google.auth.OAuth2(
            process.env.CLIENT_ID,
            process.env.CLIENT_SECRET,
            'urn:ietf:wg:oauth:2.0:oob'
          );

          oauth2Client.getToken(code, (err, token) => {
            if (err) return console.error('Error:', err);

            console.log('\n✅ आपका REFRESH TOKEN:\n');
            console.log(token.refresh_token);

            console.log('\n⚠️ SAVE THIS IN GITHUB SECRETS');
          });
          "
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}